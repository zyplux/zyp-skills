# Release targets for this repo. Read by cerberus's release-bumps check to enforce
# a version bump whenever a skill's surface changes since its last tag. Skills aren't
# published to any registry — the tag itself (e.g. `h2md-v0.7.0`) is the release marker.

[[target]]
label = "gen-commit-message"
tag_prefix = "gen-commit-message-v"
version = { file = "skills/gen-commit-message/SKILL.md", regex = '^\s*version:\s*"([^"]+)"' }
surface = ["skills/gen-commit-message"]

[[target]]
label = "h2md"
tag_prefix = "h2md-v"
version = { file = "skills/h2md/SKILL.md", regex = '^\s*version:\s*"([^"]+)"' }
surface = ["skills/h2md"]

