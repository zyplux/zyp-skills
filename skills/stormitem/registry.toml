# stormitem — repo registry
#
# Maps short repo names to (owner, features). Features are the Conventional
# Commits scopes that stormitem accepts for that repo. Adding a repo or feature
# here is a versioned PR — there is no user-config layer in v1.
#
# The `zyp-skills` features must match the directory listing under
# `skills/`. The sync test in tests/skills/stormitem/test_registry_sync.py
# enforces this.

[repos.zyp-skills]
owner = "zyplux"
features = [
    "gen-commit-message",
    "h2md",
    "mermaid",
    "peek",
    "plan-storm",
    "stormitem",
    "suggest",
]
